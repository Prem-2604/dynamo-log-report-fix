name: Verify Task
on: [push]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install harbor
        run: uv tool install harbor --python 3.12
      - name: Run oracle
        run: harbor run -p . -a oracle
