artifacts = ["/app/perplexity_scores.json"]

[task]
name = "dynamo/perplexity-scorer"
description = "Debug and fix a silently wrong perplexity scoring script for a small causal language model."

[metadata]
category = "machine_learning_and_ai"
subcategory = "nlp_and_language_models"
task_objective = ["debug", "fix", "validate"]
artifact_type = ["single_script_or_program", "model_or_checkpoint", "mathematical_or_scientific_model", "generated_output_artifact"]
expert_time_estimate_hours = 0.75
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The agent must identify a subtle off-by-one bug in a causal LM perplexity scorer, correct it, and produce the right scores for a small evaluation set."
solution_explanation = "Inspect the scoring script, compare its output against the intended autoregressive LM behavior, reason about the token shift bug, and correct the implementation so it computes perplexity from the correct target token."
verification_explanation = "Checks that /app/perplexity_scores.json exists and that each sequence score matches the reference values within the expected tolerance."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
